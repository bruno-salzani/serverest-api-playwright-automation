name: pages-allure

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (browsers)
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ vars.BASE_URL }}
        run: npm test

      - name: Run Java tests
        env:
          baseUrl: ${{ vars.BASE_URL }}
        run: ./mvnw -q test

      - name: Combine Allure results
        run: |
          mkdir -p allure-results-combined
          cp -r allure-results/* allure-results-combined/ || true
          cp -r target/allure-results/* allure-results-combined/ || true

      - name: Generate Allure report
        run: npx allure generate --clean ./allure-results-combined -o ./allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

